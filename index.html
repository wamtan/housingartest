<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>平面AR</title>

  <script type="module"
    src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #f5f5f5;
    }

    model-viewer {
      width: 100vw;
      height: 100vh;
      background: #eeeeee;
    }

    .note {
      position: fixed;
      left: 12px;
      right: 12px;
      bottom: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.9);
      border-radius: 10px;
      font-size: 14px;
      text-align: center;
    }
  </style>
</head>

<body>
  <model-viewer
    src="character.glb"
    ios-src="character.usdz"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    auto-rotate
    shadow-intensity="1"
    exposure="1"
    alt="オリジナルキャラクター">
  </model-viewer>

  <div class="note">
    「ARで見る」を押すと、Android/iPhoneで平面AR表示します
  </div>
</body>
</html>
